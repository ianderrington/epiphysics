content: |
  **Epiphysics** develops Epimechanics: a generalized mechanical framework that applies F = dp/dt to any time-varying quantity, not just physical ones.

  **Core insight:** All representations have mechanical structure. Good representations have *simple* mechanical structure -- simple enough to predict dynamics at minimal computational cost. The existence of an optimal representation is a theorem (Shannon, Rissanen, Solomonoff). That it has Lagrangian structure is the conjecture.

  **Current focus areas:**
  - **Theory** -- Six-part series: atomic structure, generalized mechanics, meta-entities, consciousness, time & soul, ontology
  - **Applications** -- Efficiency limits, robustness metrics, entropy in everyday systems
  - **Research** -- Representational efficiency paper, rate-distortion proof, experimental protocols
  - **Experiments** -- Lagrangian vs neural ODE, conservation law discovery, irreversibility signatures
  - **Popular** -- Accessible introductions: why your desk gets messy, why habits are hard to break
